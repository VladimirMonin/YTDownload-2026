name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  offline-smoke:
    name: Offline smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install FFmpeg on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install FFmpeg on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install ffmpeg -y --no-progress

      - name: Sync dependencies
        run: uv sync

      - name: Offline tests
        run: uv run pytest tests/ -m "not e2e" -q

      - name: MCP smoke
        run: uv run python scripts/smoke_mcp.py

      - name: GUI smoke
        run: uv run python scripts/smoke_gui.py
